<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f8f8f6;
    --border: #d0d0cc;
    --text: #111111;
    --muted: #333333;
    --accent: #111111;
    --out: #b92a1e;
    --in: #1e8a4a;
    --invest: #1a6fa8;
    --rent: #7b3aa8;
    --transfer: #b84a00;
    --refund: #1e8a4a;
    --salary: #1e8a4a;
    --dividend: #0d7a68;
    --interest: #0d7a68;
    --creditcard: #b92a1e;
    --tag-bg: #e0e0dc;
    --radius: 4px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    border-bottom: 1.5px solid var(--border);
    padding: 20px 20px 16px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    overflow: hidden;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: -0.5px;
  }
  header span {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    word-break: break-word;
    max-width: 100%;
  }

  main { padding: 20px; max-width: 1400px; margin: 0 auto; }
  @media (min-width: 700px) { main { padding: 32px 40px; } header { padding: 28px 40px 20px; } }

  /* UPLOAD */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 28px;
    background: var(--surface);
  }
  @media (min-width: 700px) { .upload-zone { padding: 48px; } }
  .upload-zone:hover { border-color: var(--accent); background: #f4f4f0; }
  .upload-zone.dragover { border-color: var(--accent); background: #efefeb; }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 28px; margin-bottom: 12px; }
  .upload-zone p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .upload-zone strong { font-weight: 600; font-size: 15px; }

  /* SUMMARY CARDS */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; gap: 10px; } }
  .card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    background: var(--surface);
  }
  .card-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .card-value.out { color: var(--out); }
  .card-value.in  { color: var(--in); }
  .card-value.net-pos { color: var(--in); }
  .card-value.net-neg { color: var(--out); }

  /* SECTION TITLES */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .filters select, .filters input {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 110px; flex: 1; }
  @media (max-width: 600px) { .filter-group { min-width: calc(50% - 10px); flex: unset; width: calc(50% - 5px); } }
  .filters select:focus, .filters input:focus { border-color: var(--accent); }
  .filters label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; font-weight: 500; }
  .btn-reset {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--text); }

  /* CHARTS */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-box {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    background: var(--surface);
  }
  .chart-box h3 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 600;
  }
  .chart-box canvas { max-height: 300px; width: 100% !important; }

  /* BREAKDOWN TABLES */
  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) { .breakdown-grid { grid-template-columns: 1fr; } }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 700;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1.5px solid var(--border);
    white-space: nowrap;
  }
  thead th.num { text-align: right; }
  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }
  tbody td.num {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f0f0ec; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    text-transform: capitalize;
    background: #f0f0ec;
    color: #555555;
  }
  .tag.spend             { background: #fceaea; color: #c0392b; }
  .tag.rent              { background: #f3eafc; color: #8e44ad; }
  .tag.investment        { background: #eaf3fc; color: #2980b9; }
  .tag.refund            { background: #eafaf1; color: #27ae60; }
  .tag.salary            { background: #eafaf1; color: #27ae60; }
  .tag.dividend          { background: #e8f8f5; color: #16a085; }
  .tag.interest          { background: #e8f8f5; color: #16a085; }
  .tag.fund-transfer     { background: #fef0e7; color: #d35400; }
  .tag.credit-card-bill  { background: #fceaea; color: #c0392b; }

  .out-val { color: #c0392b; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 400; }
  .in-val  { color: #27ae60; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 400; }
  .zero    { color: #cccccc; font-family: 'DM Mono', monospace; font-size: 12px; }

  .section { margin-bottom: 32px; }

  /* TRANSACTION TABLE WRAPPER */
  .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* PAGINATION */
  .pagination {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text);
    flex-wrap: wrap;
  }
  .pagination button {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
    font-weight: 600;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); }
  .pagination button:disabled { color: #aaaaaa; cursor: default; }
  .pagination .page-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); font-weight: 500; }

  .hidden { display: none !important; }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .divider { border: none; border-top: 1.5px solid var(--border); margin: 32px 0; }

  /* tfoot total row */
  tfoot td {
    padding: 10px 12px;
    border-top: 1.5px solid var(--border);
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  tfoot td.num { text-align: right; }
</style>
</head>
<body>

<header>
  <h1>Expense Tracker</h1>
  <span id="header-range"></span>
</header>

<main>
  <!-- UPLOAD -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
    <div class="icon">📂</div>
    <strong>Upload your transaction file</strong>
    <p>Drag & drop or click to select — .xlsx, .xls, or .csv</p>
  </div>

  <div id="dashboard" class="hidden">

    <!-- SUMMARY CARDS -->
    <div class="cards" id="cards"></div>

    <hr class="divider"/>

    <!-- CHARTS -->
    <div class="section">
      <div class="section-title">Overview</div>
      <div class="charts-grid">
        <div class="chart-box">
          <h3>Monthly Cash Flow</h3>
          <canvas id="chart-monthly"></canvas>
        </div>
        <div class="chart-box">
          <h3>Spending by Transaction Type</h3>
          <canvas id="chart-type"></canvas>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <!-- BREAKDOWNS -->
    <div class="section">
      <div class="section-title">Breakdowns</div>
      <div class="breakdown-grid">
        <div>
          <table id="monthly-table">
            <thead>
              <tr>
                <th>Month</th>
                <th class="num">Cash Out</th>
                <th class="num">Cash In</th>
                <th class="num">Net</th>
              </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr>
                <td>Total</td>
                <td class="num out-val" id="monthly-total-out"></td>
                <td class="num in-val" id="monthly-total-in"></td>
                <td class="num" id="monthly-total-net"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div>
          <table id="type-table">
            <thead>
              <tr>
                <th>Transaction Type</th>
                <th class="num">Cash Out</th>
                <th class="num">Cash In</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <!-- TRANSACTIONS -->
    <div class="section">
      <div class="section-title">All Transactions</div>
      <div class="filters">
        <div class="filter-group">
          <label>Month</label>
          <select id="filter-month"><option value="">All Months</option></select>
        </div>
        <div class="filter-group">
          <label>Bank</label>
          <select id="filter-bank"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Type</label>
          <select id="filter-type"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Search</label>
          <input type="text" id="filter-search" placeholder="amount, date…"/>
        </div>
        <div style="align-self:flex-end">
          <button class="btn-reset" id="btn-reset">Reset</button>
        </div>
        <div style="margin-left:auto; align-self:flex-end; font-family:'DM Mono',monospace; font-size:11px; color:var(--text); font-weight:600" id="row-count"></div>
      </div>
      <div class="table-wrapper">
        <table id="tx-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Bank</th>
              <th>Date</th>
              <th>Type</th>
              <th class="num">Cash Out ↓</th>
              <th class="num">Cash In ↑</th>
            </tr>
          </thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

  </div><!-- /dashboard -->
</main>

<script>
const PAGE_SIZE = 50;
let allRows = [];
let filteredRows = [];
let currentPage = 1;
let charts = {};

// ── Upload handlers ─────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
      parseRows(raw);
    } catch(err) {
      alert('Could not read file. Make sure it is a valid .xlsx/.xls/.csv file.\n' + err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Parse ────────────────────────────────────────────────────────────────────
function parseRows(raw) {
  allRows = raw.map((r, i) => {
    // normalise key names (handle casing/spaces)
    const keys = Object.keys(r);
    const get = (...names) => {
      for (const n of names) {
        const k = keys.find(k => k.trim().toLowerCase() === n.toLowerCase());
        if (k !== undefined) return r[k];
      }
      return '';
    };

    const cashOutRaw = get('Cash Out', 'CashOut', 'cash_out', 'Debit');
    const cashInRaw  = get('Cash In',  'CashIn',  'cash_in',  'Credit');
    const dateRaw    = get('Transaction Date', 'Date', 'date');
    const txType = String(get('Transaction type', 'Transaction Type', 'Type', 'type') || '').trim();
    const bank   = String(get('Bank', 'bank') || '').trim();

    const cashOut = parseAmount(cashOutRaw);
    const cashIn  = parseAmount(cashInRaw);
    const date    = parseDate(dateRaw);

    return { sno: i + 1, bank, date, txType, cashOut, cashIn };
  }).filter(r => r.date);

  allRows.sort((a, b) => a.date - b.date);
  buildDashboard();
}

function parseAmount(v) {
  if (v === '' || v === null || v === undefined) return 0;
  if (typeof v === 'number') return v;
  const s = String(v).replace(/[₹,\s]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  const s = String(v).trim();
  if (!s) return null;
  // Try direct parse — works for "01 March 2025", "2025-03-01", "01/03/2025" etc.
  const d = new Date(s);
  if (!isNaN(d)) return d;
  // Try DD-MM-YYYY or DD/MM/YYYY
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
  return null;
}

// ── Build dashboard ──────────────────────────────────────────────────────────
function buildDashboard() {
  document.getElementById('dashboard').classList.remove('hidden');
  zone.style.marginBottom = '24px';

  // header range
  const dates = allRows.map(r => r.date);
  const minD = new Date(Math.min(...dates));
  const maxD = new Date(Math.max(...dates));
  const uniqueTypes = [...new Set(allRows.map(r => r.txType))];
  document.getElementById('header-range').textContent =
    `${fmt(minD)} – ${fmt(maxD)}  ·  ${allRows.length} transactions  ·  ${uniqueTypes.length} types`;

  buildCards();
  buildFilters();
  buildMonthlyTable();
  buildTypeTable();
  buildCharts();
  applyFilters();
}

function fmt(d) {
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtMonth(key) {
  const [y, m] = key.split('-');
  return new Date(+y, +m - 1, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
}
function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtAmt(n) {
  return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Cards ────────────────────────────────────────────────────────────────────
function buildCards() {
  const totalOut = allRows.reduce((s, r) => s + r.cashOut, 0);
  const totalIn  = allRows.reduce((s, r) => s + r.cashIn, 0);
  const net      = totalIn - totalOut;

  const cards = [
    { label: 'Total Cash Out', value: fmtAmt(totalOut), cls: 'out' },
    { label: 'Total Cash In',  value: fmtAmt(totalIn),  cls: 'in'  },
    { label: 'Net',            value: (net >= 0 ? '+' : '-') + fmtAmt(Math.abs(net)), cls: net >= 0 ? 'net-pos' : 'net-neg', suffix: net >= 0 ? ' surplus' : ' deficit' },
  ];

  const el = document.getElementById('cards');
  el.innerHTML = cards.map(c => `
    <div class="card">
      <div class="card-label">${c.label}</div>
      <div class="card-value ${c.cls}">${c.value}${c.suffix||''}</div>
    </div>`).join('');
}

// ── Filters ──────────────────────────────────────────────────────────────────
function buildFilters() {
  const months = [...new Set(allRows.map(r => monthKey(r.date)))].sort();
  const banks  = [...new Set(allRows.map(r => r.bank))].sort();
  const types  = [...new Set(allRows.map(r => r.txType))].sort();

  const selMonth = document.getElementById('filter-month');
  const selBank  = document.getElementById('filter-bank');
  const selType  = document.getElementById('filter-type');

  selMonth.innerHTML = '<option value="">All Months</option>' +
    months.map(m => `<option value="${m}">${fmtMonth(m)}</option>`).join('');
  selBank.innerHTML = '<option value="">All Banks</option>' +
    banks.map(b => `<option value="${b}">${b}</option>`).join('');
  selType.innerHTML = '<option value="">All Types</option>' +
    types.map(t => `<option value="${t}">${t}</option>`).join('');

  [selMonth, selBank, selType].forEach(s => s.addEventListener('change', () => { currentPage=1; applyFilters(); }));
  document.getElementById('filter-search').addEventListener('input', () => { currentPage=1; applyFilters(); });
  document.getElementById('btn-reset').addEventListener('click', () => {
    selMonth.value = ''; selBank.value = ''; selType.value = '';
    document.getElementById('filter-search').value = '';
    currentPage = 1; applyFilters();
  });
}

function applyFilters() {
  const month  = document.getElementById('filter-month').value;
  const bank   = document.getElementById('filter-bank').value;
  const type   = document.getElementById('filter-type').value;
  const search = document.getElementById('filter-search').value.toLowerCase().trim();

  filteredRows = allRows.filter(r => {
    if (month && monthKey(r.date) !== month) return false;
    if (bank  && r.bank !== bank) return false;
    if (type  && r.txType !== type) return false;
    if (search) {
      const hay = `${r.bank} ${r.txType} ${r.cashOut} ${r.cashIn} ${fmt(r.date)}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('row-count').textContent = `${filteredRows.length} rows`;
  renderTable();
  renderPagination();
}

// ── Transaction table ────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tx-body');
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredRows.slice(start, start + PAGE_SIZE);

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No transactions found.</td></tr>`;
    return;
  }

  tbody.innerHTML = slice.map((r, i) => {
    const typeKey = r.txType.toLowerCase().replace(/\s+/g, '-');
    const out = r.cashOut > 0 ? `<span class="out-val">${fmtAmt(r.cashOut)}</span>` : `<span class="zero">—</span>`;
    const inn = r.cashIn  > 0 ? `<span class="in-val">${fmtAmt(r.cashIn)}</span>`  : `<span class="zero">—</span>`;
    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${start+i+1}</td>
      <td style="font-weight:500">${r.bank}</td>
      <td style="white-space:nowrap;font-family:'DM Mono',monospace;font-size:11px">${fmt(r.date)}</td>
      <td><span class="tag ${typeKey}">${r.txType}</span></td>
      <td class="num">${out}</td>
      <td class="num">${inn}</td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = Math.ceil(filteredRows.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button id="pg-prev" ${currentPage===1?'disabled':''}>← Prev</button>
    <span class="page-info">Page ${currentPage} of ${total}</span>
    <button id="pg-next" ${currentPage===total?'disabled':''}>Next →</button>`;
  document.getElementById('pg-prev').addEventListener('click', () => { currentPage--; renderTable(); renderPagination(); });
  document.getElementById('pg-next').addEventListener('click', () => { currentPage++; renderTable(); renderPagination(); });
}

// ── Monthly breakdown table ──────────────────────────────────────────────────
function buildMonthlyTable() {
  const map = {};
  allRows.forEach(r => {
    const k = monthKey(r.date);
    if (!map[k]) map[k] = { out: 0, in: 0 };
    map[k].out += r.cashOut;
    map[k].in  += r.cashIn;
  });

  const months = Object.keys(map).sort();
  const tbody = document.querySelector('#monthly-table tbody');
  let totOut = 0, totIn = 0;

  tbody.innerHTML = months.map(k => {
    const { out, inn2 = map[k].in } = { out: map[k].out, inn2: map[k].in };
    totOut += out; totIn += inn2;
    const net = inn2 - out;
    const netCls = net >= 0 ? 'in-val' : 'out-val';
    return `<tr>
      <td>${fmtMonth(k)}</td>
      <td class="num out-val">${fmtAmt(out)}</td>
      <td class="num in-val">${fmtAmt(inn2)}</td>
      <td class="num ${netCls}">${net>=0?'+':''}${fmtAmt(net)}</td>
    </tr>`;
  }).join('');

  document.getElementById('monthly-total-out').textContent = fmtAmt(totOut);
  document.getElementById('monthly-total-in').textContent  = fmtAmt(totIn);
  const totalNet = totIn - totOut;
  const tnEl = document.getElementById('monthly-total-net');
  tnEl.textContent = (totalNet>=0?'+':'')+fmtAmt(totalNet);
  tnEl.className = 'num ' + (totalNet >= 0 ? 'in-val' : 'out-val');
}

// ── Type breakdown table ─────────────────────────────────────────────────────
function buildTypeTable() {
  const map = {};
  allRows.forEach(r => {
    const k = (r.txType || 'Unknown').trim();
    if (!map[k]) map[k] = { out: 0, in: 0 };
    map[k].out += r.cashOut;
    map[k].in  += r.cashIn;
  });

  const types = Object.keys(map).sort((a,b) => (map[b].out+map[b].in)-(map[a].out+map[a].in));
  const tbody = document.querySelector('#type-table tbody');
  tbody.innerHTML = types.map(k => {
    const { out, in: inn } = map[k];
    const typeKey = k.toLowerCase().replace(/\s+/g, '-');
    return `<tr>
      <td><span class="tag ${typeKey}">${k}</span></td>
      <td class="num">${out > 0 ? `<span class="out-val">${fmtAmt(out)}</span>` : '<span class="zero">—</span>'}</td>
      <td class="num">${inn > 0 ? `<span class="in-val">${fmtAmt(inn)}</span>` : '<span class="zero">—</span>'}</td>
    </tr>`;
  }).join('');
}

// ── Charts ───────────────────────────────────────────────────────────────────
function buildCharts() {
  // Monthly bar chart
  const monthMap = {};
  allRows.forEach(r => {
    const k = monthKey(r.date);
    if (!monthMap[k]) monthMap[k] = { out: 0, in: 0 };
    monthMap[k].out += r.cashOut;
    monthMap[k].in  += r.cashIn;
  });
  const mKeys = Object.keys(monthMap).sort();
  const mLabels = mKeys.map(k => {
    const [y, m] = k.split('-');
    return new Date(+y, +m-1, 1).toLocaleDateString('en-IN', { month: 'short', year: '2-digit' });
  });

  if (charts['monthly']) charts['monthly'].destroy();
  charts['monthly'] = new Chart(document.getElementById('chart-monthly'), {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [
        { label: 'Cash Out', data: mKeys.map(k => monthMap[k].out), backgroundColor: '#e57368', borderColor: '#b92a1e', borderWidth: 1.5, borderRadius: 2 },
        { label: 'Cash In',  data: mKeys.map(k => monthMap[k].in),  backgroundColor: '#5cb87a', borderColor: '#1e8a4a', borderWidth: 1.5, borderRadius: 2 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { font: { family: 'DM Mono', size: 11 }, color: '#111111', boxWidth: 12, padding: 10 } } },
      scales: {
        x: { ticks: { font: { family: 'DM Mono', size: 9 }, color: '#222222' }, grid: { display: false } },
        y: { ticks: { font: { family: 'DM Mono', size: 9 }, color: '#222222', callback: v => '₹' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#d0d0cc' } }
      }
    }
  });

  // Type doughnut (cash out only)
  const typeMap = {};
  allRows.filter(r => r.cashOut > 0).forEach(r => {
    const k = (r.txType || 'Unknown').trim();
    typeMap[k] = (typeMap[k] || 0) + r.cashOut;
  });
  const tKeys = Object.keys(typeMap).sort((a,b) => typeMap[b]-typeMap[a]);
  const totalOut2 = tKeys.reduce((s,k) => s + typeMap[k], 0);
  const palette = ['#C084FC','#F87171','#60A5FA','#34D399','#FDE047','#FB923C','#F87171','#F472B6','#38BDF8','#A78BFA'];

  if (charts['type']) charts['type'].destroy();
  charts['type'] = new Chart(document.getElementById('chart-type'), {
    type: 'doughnut',
    data: {
      labels: tKeys,
      datasets: [{
        data: tKeys.map(k => typeMap[k]),
        backgroundColor: tKeys.map((_, i) => palette[i % palette.length]),
        borderColor: '#ffffff',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'DM Mono', size: 10 }, color: '#111111', boxWidth: 12, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = ((ctx.parsed / totalOut2) * 100).toFixed(1);
              return ` ${ctx.label}: ₹${ctx.parsed.toLocaleString('en-IN', { maximumFractionDigits: 0 })} (${pct}%)`;
            }
          }
        }
      }
    },
    plugins: [{
      id: 'doughnutLabels',
      afterDraw(chart) {
        const { ctx, data, chartArea } = chart;
        const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
        chart.getDatasetMeta(0).data.forEach((arc, i) => {
          const pct = ((data.datasets[0].data[i] / total) * 100);
          if (pct < 4) return; // skip tiny slices
          const mid = (arc.startAngle + arc.endAngle) / 2;
          const r = (arc.innerRadius + arc.outerRadius) / 2;
          const x = arc.x + Math.cos(mid) * r;
          const y = arc.y + Math.sin(mid) * r;
          ctx.save();
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 10px DM Mono, monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(pct.toFixed(0) + '%', x, y);
          ctx.restore();
        });
      }
    }]
  });
}
</script>
